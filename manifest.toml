packaging_format = 2

id = "morelater"
name = "MoreLater"
description.en = "A drag-and-drop content calendar — a digital replacement for a whiteboard full of coloured sticky notes"

version = "0.1.0~ynh1"

maintainers = []

[upstream]
license = "free"
code = "https://github.com/1612elphi/morelater"

[integration]
yunohost = ">= 12.1"
helpers_version = "2.1"
architectures = "all"
multi_instance = true
ldap = "not_relevant"
sso = "not_relevant"
disk = "500M"
ram.build = "1024M"
ram.runtime = "256M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/morelater"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    url = "https://github.com/1612elphi/morelater/archive/288c0ce75826db90a3bf1304240065b51e1b9740.tar.gz"
    sha256 = "5b2744b7120efcf1bf51928553ad3668452fffe5ef31a684cab3451a8db525b4"
    autoupdate.strategy = "latest_github_commit"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = ["sqlite3", "python3", "make", "g++"]

    [resources.nodejs]
    version = "20"
